# QGrapho — copy to ~/.qgrapho/config.toml
# Run: qgrapho init   (interactive — picks a provider in 30 seconds)
#
# Models are 100% optional vendor-agnostic. Use ANY OpenAI-compatible provider.
# QGrapho Cloud is an optional hosted preset — not required until the endpoint is live.

[product]
name = "QGrapho"

# ── Model router (add as many providers as you want) ─────────────────────

[models]
default_provider = "openai"       # active provider id
default_model = "gpt-4o-mini"     # default model for general tasks

# Smart routing — QGrapho picks the best configured model per task type.
# Each value is "provider_id/model_id". Falls back to default_model.
[routing]
# ── Text / agents ──
chat   = "openai/gpt-4o-mini"
code   = "openai/gpt-4o"
plan   = "openai/gpt-4o"
fast   = "openai/gpt-4o-mini"
agent  = "openai/gpt-4o"
reason = "openai/gpt-4o"
# ── Vision, docs, media ──
vision    = "openai/gpt-4o"                 # screenshots, UI, diagrams in
diagram   = "openai/gpt-4o"                 # whiteboard / arch photos
doc       = "openai/gpt-4o"                 # PDF, long documents
ocr       = "openai/gpt-4o"
image_out = "openai/dall-e-3"               # generate images
audio_in  = "openai/whisper-1"              # transcribe
audio_out = "openai/tts-1"                  # text-to-speech
# ── Search / memory ──
embed  = "openai/text-embedding-3-small"
search = "openai/text-embedding-3-small"

# ── Provider: OpenAI (example — bring your own key) ──────────────────────

[[providers]]
id = "openai"
label = "OpenAI"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
enabled = true

  [[providers.models]]
  id = "gpt-4o"
  label = "GPT-4o"
  context_window = 128000
  tags = ["code", "plan", "vision", "doc", "diagram", "ocr"]
  [providers.models.modalities]
  input = ["text", "image", "file"]
  output = ["text"]
  [providers.models.modalities.features]
  tools = true
  streaming = true

  [[providers.models]]
  id = "gpt-4o-mini"
  label = "GPT-4o Mini"
  context_window = 128000
  tags = ["chat", "fast", "vision"]
  [providers.models.modalities]
  input = ["text", "image"]
  output = ["text"]

  [[providers.models]]
  id = "dall-e-3"
  label = "DALL-E 3"
  tags = ["image_out"]
  [providers.models.modalities]
  input = ["text"]
  output = ["image"]

  [[providers.models]]
  id = "whisper-1"
  label = "Whisper"
  tags = ["audio_in"]
  [providers.models.modalities]
  input = ["audio"]
  output = ["text"]

  [[providers.models]]
  id = "tts-1"
  label = "TTS"
  tags = ["audio_out"]
  [providers.models.modalities]
  input = ["text"]
  output = ["audio"]

  [[providers.models]]
  id = "text-embedding-3-small"
  label = "Embeddings Small"
  tags = ["embed", "search"]
  [providers.models.modalities]
  input = ["text"]
  output = ["embed"]

  [[providers.models]]
  id = "text-embedding-3-large"
  label = "Embeddings Large"
  tags = ["embed"]
  [providers.models.modalities]
  input = ["text"]
  output = ["embed"]

