# ── Workspace & runtime ────────────────────────────────────────────────────

[workspace]
path = ""
mount_in_engine = "/workspace"

[deploy]
profile = "native"

[console]
enabled = true

[agent_engine]
enabled = true
runtime = "process"

[graph_intelligence]
backend = "embedded"
data_dir = "~/.qgrapho/data/graphs"

[event_bus]
enabled = false

[insights]
enabled = false
