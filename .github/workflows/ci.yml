name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests
      - name: Test
        run: python -m pytest tests/ -q
      - name: Public doc vendor scan
        run: |
          ! rg -i "jcode|openhands|litellm|graphiti|playwright|verallm|vllm|kuzu" \
            README.md docs/ config/ scripts/ CONTRIBUTING.md ROADMAP.md vendor/ mcp/ services/
