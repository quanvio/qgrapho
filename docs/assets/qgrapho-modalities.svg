<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="QGrapho multimodal capabilities">
  <rect width="800" height="420" fill="#0b1220"/>
  <text x="400" y="34" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700">QGrapho — All Modalities, One Router</text>
  <text x="400" y="56" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Text · Vision · Image · Video · Audio · Documents · Embeddings · Tools</text>

  <!-- Inputs -->
  <text x="60" y="95" fill="#64748b" font-size="11" font-weight="600">INPUTS</text>
  <rect x="40" y="105" width="100" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="90" y="132" text-anchor="middle" fill="#e2e8f0" font-size="11">Text / Code</text>
  <rect x="40" y="158" width="100" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="90" y="178" text-anchor="middle" fill="#e2e8f0" font-size="11">Images</text>
  <text x="90" y="192" text-anchor="middle" fill="#64748b" font-size="9">screenshots, UI, diagrams</text>
  <rect x="40" y="211" width="100" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="90" y="231" text-anchor="middle" fill="#e2e8f0" font-size="11">Video</text>
  <text x="90" y="245" text-anchor="middle" fill="#64748b" font-size="9">recordings, demos</text>
  <rect x="40" y="264" width="100" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="90" y="284" text-anchor="middle" fill="#e2e8f0" font-size="11">Audio</text>
  <text x="90" y="298" text-anchor="middle" fill="#64748b" font-size="9">voice, meetings</text>
  <rect x="40" y="317" width="100" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="90" y="337" text-anchor="middle" fill="#e2e8f0" font-size="11">Documents</text>
  <text x="90" y="351" text-anchor="middle" fill="#64748b" font-size="9">PDF, Confluence</text>

  <!-- Router -->
  <rect x="200" y="160" width="180" height="120" rx="14" fill="#172554" stroke="#2563eb" stroke-width="2"/>
  <text x="290" y="195" text-anchor="middle" fill="#93c5fd" font-size="11">Model Router</text>
  <text x="290" y="218" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">Smart routing</text>
  <text x="290" y="238" text-anchor="middle" fill="#cbd5e1" font-size="10">chat · code · vision</text>
  <text x="290" y="254" text-anchor="middle" fill="#cbd5e1" font-size="10">image · video · audio</text>
  <text x="290" y="270" text-anchor="middle" fill="#cbd5e1" font-size="10">embed · doc · agent</text>

  <!-- Outputs -->
  <text x="560" y="95" fill="#64748b" font-size="11" font-weight="600">OUTPUTS</text>
  <rect x="520" y="105" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="130" text-anchor="middle" fill="#e2e8f0" font-size="11">Text / Code</text>
  <rect x="520" y="152" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="177" text-anchor="middle" fill="#e2e8f0" font-size="11">Generated images</text>
  <rect x="520" y="199" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="224" text-anchor="middle" fill="#e2e8f0" font-size="11">Video / motion</text>
  <rect x="520" y="246" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="271" text-anchor="middle" fill="#e2e8f0" font-size="11">Speech / TTS</text>
  <rect x="520" y="293" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="318" text-anchor="middle" fill="#e2e8f0" font-size="11">Embeddings</text>
  <rect x="520" y="340" width="110" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="575" y="365" text-anchor="middle" fill="#e2e8f0" font-size="11">Tool actions</text>

  <!-- Graphs -->
  <rect x="680" y="160" width="100" height="120" rx="12" fill="#052e16" stroke="#16a34a"/>
  <text x="730" y="195" text-anchor="middle" fill="#86efac" font-size="10">Four Graphs</text>
  <text x="730" y="218" text-anchor="middle" fill="#f8fafc" font-size="11">Code · Schema</text>
  <text x="730" y="236" text-anchor="middle" fill="#f8fafc" font-size="11">Runtime · Business</text>
  <text x="730" y="260" text-anchor="middle" fill="#cbd5e1" font-size="9">multimodal ? graph nodes</text>

  <!-- Arrows -->
  <path d="M140 127 H200 M140 180 H200 M140 233 H200 M140 286 H200 M140 339 H200" stroke="#475569" stroke-width="1.5"/>
  <path d="M380 220 H520 M630 220 H680" stroke="#475569" stroke-width="1.5"/>

  <!-- Providers footer -->
  <rect x="40" y="385" width="720" height="28" rx="6" fill="#1e1b4b" stroke="#4338ca"/>
  <text x="400" y="404" text-anchor="middle" fill="#c4b5fd" font-size="10">Unlimited providers — OpenAI-compatible APIs — your keys — your models</text>
</svg>
