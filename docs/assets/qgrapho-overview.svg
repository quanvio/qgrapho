<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="QGrapho platform overview">
  <rect width="720" height="320" fill="#0b1220"/>
  <text x="360" y="36" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700">QGrapho Platform</text>

  <!-- Sources -->
  <rect x="24" y="70" width="120" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="84" y="94" text-anchor="middle" fill="#94a3b8" font-size="11">Sources</text>
  <text x="84" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12">Git · DB · OTel</text>

  <!-- Graph Intelligence -->
  <rect x="180" y="56" width="160" height="84" rx="12" fill="#172554" stroke="#2563eb"/>
  <text x="260" y="84" text-anchor="middle" fill="#93c5fd" font-size="11">Graph Intelligence</text>
  <text x="260" y="104" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">Four Graphs</text>
  <text x="260" y="124" text-anchor="middle" fill="#cbd5e1" font-size="11">Code · Schema · Runtime · Business</text>

  <!-- Console + Engine -->
  <rect x="380" y="56" width="150" height="84" rx="12" fill="#3b0764" stroke="#7c3aed"/>
  <text x="455" y="84" text-anchor="middle" fill="#ddd6fe" font-size="11">Agents</text>
  <text x="455" y="104" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">Console + Engine</text>
  <text x="455" y="124" text-anchor="middle" fill="#cbd5e1" font-size="11">Native · No containers</text>

  <!-- Model Cloud -->
  <rect x="570" y="70" width="126" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="633" y="94" text-anchor="middle" fill="#94a3b8" font-size="11">Your models</text>
  <text x="633" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12">BYOK · any provider</text>

  <!-- Arrows -->
  <path d="M144 98 H180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M340 98 H380" stroke="#64748b" stroke-width="2"/>
  <path d="M530 98 H570" stroke="#64748b" stroke-width="2"/>

  <!-- Ops loop -->
  <rect x="180" y="190" width="360" height="72" rx="12" fill="#052e16" stroke="#16a34a"/>
  <text x="360" y="218" text-anchor="middle" fill="#86efac" font-size="11">Autonomous loop</text>
  <text x="360" y="240" text-anchor="middle" fill="#f8fafc" font-size="13">Query ? Plan ? Execute ? Verify ? Ship ? Refresh graphs</text>

  <path d="M455 140 V190" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M260 140 V170 H360 V190" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
